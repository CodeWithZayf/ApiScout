services:
  postgres:
    image: postgres:16-alpine
    container_name: apiscout-db
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-apiscout}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-apiscout_password}
      POSTGRES_DB: ${POSTGRES_DB:-apiscout}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U apiscout" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: apiscout-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-apiscout_redis}
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-apiscout_redis}", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: apiscout-backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3001"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      REDIS_URL: ${REDIS_URL:-redis://:${REDIS_PASSWORD:-apiscout_redis}@redis:6379}
      RESEND_API_KEY: ${RESEND_API_KEY}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-noreply@apiscout.com}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      PORT: "3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:3001/api/health || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    container_name: apiscout-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://backend:3001/api}
    depends_on:
      backend:
        condition: service_healthy

volumes:
  pgdata:
  redis_data:
